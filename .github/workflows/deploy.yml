name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - run: npm ci

      - name: TypeScript check
        run: npx tsc -b

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test:run

      - name: Build frontend
        run: npm run build:client

      - name: Build server
        run: npm run build:server

      - name: Deploy frontend to VPS
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: dist/client/
          remote_path: ${{ secrets.VPS_DIST_PATH }}
          remote_host: ${{ secrets.VPS_HOST }}
          remote_port: ${{ secrets.VPS_PORT }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy server to VPS
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz
          path: dist/server/
          remote_path: ${{ secrets.VPS_SERVER_DIST_PATH }}
          remote_host: ${{ secrets.VPS_HOST }}
          remote_port: ${{ secrets.VPS_PORT }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Restart server on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/matanadmin/web/dev.panda-il.com/public_html
            npm run pm2:restart || pm2 restart pandavoice
